# config.agent.pi-zero.toml — Pi Zero 2W howick-agent config
#
# Deployed to ~/config.toml on the Pi Zero 2W by: mise run deploy:pi-zero
# howick-agent subscribes to Pi 5 OPC UA server and writes jobs to virtual USB.
#
# USB gadget setup: see docs/customer/06-pi-zero-setup.md
# The Howick FRAMA sees the Pi Zero as a normal USB stick.
#
# Root of virtual USB drive — Howick FRAMA reads from here.
# If the machine expects a subfolder, change to e.g. /mnt/usb_share/Howick/Jobs

# ── Fields unused by howick-agent (but required by shared Config struct) ──────
# howick-agent is a minimal binary — no OPC UA server, no HTTP server.
# These sections must be present so the TOML parses correctly; values don't matter.

[opcua]
host             = "0.0.0.0"
port             = 4840
application_name = "Howick Edge Agent - Pi Zero"

[http]
host = "0.0.0.0"
port = 4841

[machine]
machine_name = "Howick FRAMA"

# Incoming CSVs from Pi 5 land here temporarily before being written to USB
job_input_dir = "/home/pi/jobs/input"

machine_input_dir = "/mnt/usb_share"

machine_output_dir = "/home/pi/jobs/output"

# Pi Zero IS the USB gadget — this triggers usb-refresh.sh after each write
usb_gadget_mode = true


[plat_trunk]
# Pi Zero connects to Pi 5 via OPC UA — subscribes to Jobs/PendingJobId.
# The Pi 5 pushes a notification instantly when a new job is queued.
# No polling loop. This is standard industrial M2M over OPC UA.
#
# Override at runtime: PLAT_TRUNK_URL=opc.tcp://howick-pi5.local:4840/
#
# HTTP fallback (cloud plat-trunk): change to https://your-plat-trunk.workers.dev
url                       = "opc.tcp://howick-pi5.local:4840/"
api_key                   = ""
status_push_interval_secs = 5

[sensor]
# Phase 2: load cell + HX711 on Pi Zero GPIO — reads coil weight and pushes to Pi 5.
#
# Wiring: HX711 DAT → GPIO 5 (pin 29), HX711 CLK → GPIO 6 (pin 31)
# Override pins: HX711_DAT_PIN=5 HX711_CLK_PIN=6
#
# Calibration:
#   1. Set enabled=false, run: COIL_WEIGHT_KG=10.0 — confirm 10kg appears on dashboard
#   2. Weigh empty coil spool — enter weight in kg below as empty_spool_kg
#   3. Set enabled=true with sensor wired and load cell under spool
#   4. Adjust steel_kg_per_m if material is different from S8908 (0.74 kg/m)
#
# Dev test (no hardware): echo "23.5" > /tmp/coil_weight_kg
enabled            = false    # (**) Set true after calibration
empty_spool_kg     = 18.0     # (**) Weigh empty spool and enter here
steel_kg_per_m     = 0.74     # S8908 profile — adjust for other profiles
low_alert_m        = 50.0     # (**) Operator gets warned below this level
poll_interval_secs = 30
