# Speckle server — all-Docker (amd64, slow on ARM Mac)
# Only use this if native setup doesn't work. Prefer ../speckle-server/
#
# From project root:  mise run speckle:docker:up
# From this dir:      mise run up

[tasks.pull]
description = "Pull Docker images (amd64 — slow on ARM Mac)"
run = "docker compose pull"

[tasks.up]
description = "Start all-Docker Speckle -> http://127.0.0.1:8090"
run = "docker compose up -d && echo 'Speckle: http://127.0.0.1:8090'"

[tasks.down]
description = "Stop all-Docker Speckle"
run = "docker compose down"

[tasks.status]
description = "Container status"
run = "docker compose ps"

[tasks.logs]
description = "Stream server logs"
run = "docker compose logs -f speckle-server"

[tasks.reset]
description = "Stop and wipe all data (Postgres + MinIO)"
run = "docker compose down -v"
