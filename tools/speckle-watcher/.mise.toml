# Speckle watcher — SketchUp → CSV bridge
# Source docker-compose: https://github.com/specklesystems/speckle-server/blob/main/docker-compose-speckle.yml
#
# Quick start:
#   mise run speckle:setup           # install Python deps
#   mise run speckle:server:pull     # pull Docker images (one-time)
#   mise run speckle:server:up       # start local Speckle
#   mise run speckle:model:inspect   # inspect SketchUp geometry
#   mise run speckle:model:convert f3318660fc c6539853c0 output/

[tools]
python = "3.12"

[env]
PYTHONPATH = "src"
_.file = ".env"

# ── Setup ────────────────────────────────────────────────────────────────────

[tasks."speckle:setup"]
description = "Install Python dependencies (specklepy)"
run = "pip install specklepy"

# ── Local server (Docker) ────────────────────────────────────────────────────

[tasks."speckle:server:pull"]
description = "Pull Docker images (one-time, ~3GB, amd64 — emulated on ARM Mac)"
run = """
echo "Pulling Speckle images (amd64)..."
docker pull --platform linux/amd64 speckle/speckle-server:2.31.0 &
docker pull --platform linux/amd64 speckle/speckle-preview-service:2.31.0 &
docker pull --platform linux/amd64 speckle/speckle-frontend-2:2.31.0 &
docker pull --platform linux/amd64 speckle/speckle-docker-compose-ingress:2.31.0 &
docker pull --platform linux/amd64 speckle/speckle-webhook-service:2.31.0 &
docker pull --platform linux/amd64 speckle/speckle-fileimport-service:2.29.0 &
docker pull --platform linux/amd64 speckle/speckle-ifc-import-service:2.31.0 &
docker pull minio/minio:latest &
docker pull postgres:16-alpine &
docker pull redis:7-alpine &
wait
echo "Done. All images pulled."
"""

[tasks."speckle:server:up"]
description = "Start local Speckle → http://127.0.0.1:8090"
run = "docker compose up -d && echo 'Speckle: http://127.0.0.1:8090'"

[tasks."speckle:server:down"]
description = "Stop local Speckle"
run = "docker compose down"

[tasks."speckle:server:reset"]
description = "Stop and wipe all data (Postgres + MinIO)"
run = "docker compose down -v"

[tasks."speckle:server:status"]
description = "Container status"
run = "docker compose ps"

[tasks."speckle:server:logs"]
description = "Stream server logs"
run = "docker compose logs -f speckle-server"

# ── Model tools ──────────────────────────────────────────────────────────────

[tasks."speckle:model:inspect"]
description = "Inspect SketchUp geometry from Speckle (layers, meshes, groups)"
run = "python3 -m speckle_watcher.inspect_skp ${@}"

[tasks."speckle:model:convert"]
description = "Generate Howick CSV from Speckle model — <project_id> <model_id> [output_dir]"
run = "python3 -m speckle_watcher.converter ${@}"
