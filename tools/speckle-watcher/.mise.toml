# Speckle watcher — SketchUp → CSV bridge (client/converter)
# Requires: speckle-server running (see ../speckle-server/)
#
# From project root:  mise run speckle:watcher:model:inspect
# From this dir:      mise run model:inspect

[tools]
python = "3.13"

[env]
PYTHONPATH = "src"
_.file = ".env"

[tasks.setup]
description = "Install Python dependencies (specklepy)"
run = "pip install specklepy"

[tasks."model:inspect"]
description = "Inspect SketchUp geometry from Speckle (layers, meshes, groups)"
run = "python3 -m speckle_watcher.inspect_skp ${@}"

[tasks."model:convert"]
description = "Generate Howick CSV from Speckle model — <project_id> <model_id> [output_dir]"
run = "python3 -m speckle_watcher.converter ${@}"
