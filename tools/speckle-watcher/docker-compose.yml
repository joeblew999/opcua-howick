# Local Speckle server for .skp → geometry conversion
# No cloud dependency. Run: docker compose up -d
#
# After startup:
#   - Web UI: http://localhost:80
#   - API: http://localhost:80/graphql
#   - MinIO: http://localhost:9000 (minioadmin/minioadmin)
#
# First run: create an account via the web UI, then create a token.
# Update .env with SPECKLE_SERVER=http://localhost and your new token.

services:
  speckle-ingress:
    image: speckle/speckle-docker-compose-ingress:latest
    platform: linux/amd64
    restart: always
    ports:
      - '127.0.0.1:8090:8080'
    environment:
      FILE_SIZE_LIMIT_MB: '100'
      NGINX_ENVSUBST_OUTPUT_DIR: '/etc/nginx'
    depends_on:
      - speckle-server
      - speckle-frontend-2

  speckle-frontend-2:
    image: speckle/speckle-frontend-2:latest
    platform: linux/amd64
    restart: always
    environment:
      NUXT_PUBLIC_SERVER_NAME: 'opcua-howick-local'
      NUXT_PUBLIC_API_ORIGIN: 'http://127.0.0.1:8090'
      NUXT_PUBLIC_BASE_URL: 'http://127.0.0.1:8090'
      NUXT_PUBLIC_BACKEND_API_ORIGIN: 'http://speckle-server:3000'
      NUXT_PUBLIC_LOG_LEVEL: 'warn'
      NUXT_REDIS_URL: 'redis://redis'
      LOG_LEVEL: 'info'
      NUXT_PUBLIC_FF_LARGE_FILE_IMPORTS_ENABLED: 'true'
      NUXT_PUBLIC_FF_NEXT_GEN_FILE_IMPORTER_ENABLED: 'true'
    depends_on:
      - speckle-server

  speckle-server:
    image: speckle/speckle-server:latest
    platform: linux/amd64
    restart: always
    environment:
      CANONICAL_URL: 'http://127.0.0.1:8090'
      PRIVATE_OBJECTS_SERVER_URL: 'http://speckle-server:3000'
      SESSION_SECRET: 'opcua-howick-local-dev-secret'
      STRATEGY_LOCAL: 'true'
      LOG_LEVEL: 'info'
      POSTGRES_URL: 'postgres'
      POSTGRES_USER: 'speckle'
      POSTGRES_PASSWORD: 'speckle'
      POSTGRES_DB: 'speckle'
      REDIS_URL: 'redis://redis'
      PREVIEW_SERVICE_USE_PRIVATE_OBJECTS_SERVER_URL: 'true'
      PREVIEW_SERVICE_REDIS_URL: 'redis://redis'
      FILEIMPORT_SERVICE_USE_PRIVATE_OBJECTS_SERVER_URL: 'true'
      FILEIMPORT_SERVICE_REDIS_URL: 'redis://redis'
      S3_ENDPOINT: 'http://minio:9000'
      S3_PUBLIC_ENDPOINT: 'http://127.0.0.1:9000'
      S3_ACCESS_KEY: 'minioadmin'
      S3_SECRET_KEY: 'minioadmin'
      S3_BUCKET: 'speckle-server'
      S3_CREATE_BUCKET: 'true'
      FILE_SIZE_LIMIT_MB: 100
      EMAIL_FROM: 'no-reply@localhost'
      EMAIL_SECURE: 'false'
      EMAIL_REQUIRE_TLS: 'false'
      FRONTEND_ORIGIN: 'http://127.0.0.1:8090'
      FILEIMPORT_QUEUE_POSTGRES_URL: 'postgresql://speckle:speckle@postgres/speckle'
      FF_NEXT_GEN_FILE_IMPORTER_ENABLED: 'true'
    depends_on:
      - postgres
      - redis
      - minio

  preview-service:
    image: speckle/speckle-preview-service:latest
    platform: linux/amd64
    restart: always
    mem_limit: '3000m'
    environment:
      LOG_LEVEL: 'info'
      PG_CONNECTION_STRING: 'postgres://speckle:speckle@postgres/speckle'
      REDIS_URL: 'redis://redis'
      OBJECTS_SERVER_URL: 'http://speckle-server:3000'
    depends_on:
      - speckle-server

  webhook-service:
    image: speckle/speckle-webhook-service:latest
    platform: linux/amd64
    restart: always
    environment:
      LOG_LEVEL: 'info'
      PG_CONNECTION_STRING: 'postgres://speckle:speckle@postgres/speckle'
      REDIS_URL: 'redis://redis'
    depends_on:
      - speckle-server

  fileimport-service:
    image: speckle/speckle-fileimport-service:latest
    platform: linux/amd64
    restart: always
    environment:
      LOG_LEVEL: 'info'
      PG_CONNECTION_STRING: 'postgres://speckle:speckle@postgres/speckle'
      REDIS_URL: 'redis://redis'
      SPECKLE_SERVER_URL: 'http://speckle-server:3000'
    depends_on:
      - speckle-server

  ifc-import-service:
    image: speckle/speckle-ifc-import-service:latest
    platform: linux/amd64
    restart: always
    environment:
      LOG_LEVEL: 'info'
      PG_CONNECTION_STRING: 'postgres://speckle:speckle@postgres/speckle'
      REDIS_URL: 'redis://redis'
      SPECKLE_SERVER_URL: 'http://speckle-server:3000'
    depends_on:
      - speckle-server

  # ── Infrastructure ──────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: speckle
      POSTGRES_USER: speckle
      POSTGRES_PASSWORD: speckle
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    ports:
      - '127.0.0.1:9000:9000'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
