# Speckle server — run from source, 100% native (no amd64 emulation)
# Source: https://github.com/specklesystems/speckle-server
#
# Daemons managed by pitchfork (pitchfork.toml in this directory).
# One-shot scripts (setup, test, admin) remain as bash in tasks/.
#
# From project root:  mise run speckle:server:start
# From this dir:      mise run start

[tools]
node = "22.19.0"
postgres = "16"
redis = "latest"
minio = "latest"
pitchfork = "latest"

[env]
_.file = [".env"]
SPECKLE_VERSION = "2.31.0"
SPECKLE_SERVER_VERSION = "2.31.0"
SPECKLE_SRC = "{{config_root}}/src"
SPECKLE_DATA = "{{config_root}}/data"
SPECKLE_LOGS = "{{config_root}}/data/logs"
PGDATA = "{{config_root}}/data/postgres"
MINIO_DATA = "{{config_root}}/data/minio"
SPECKLE_ROOT = "{{config_root}}"
SHARP_IGNORE_GLOBAL_LIBVIPS = "1"

# ── Lifecycle (pitchfork) ────────────────────────────────────────────────────

[tasks.setup]
description = "First-time setup: clone, install, build, init infra"
file = "tasks/setup"
raw = true

[tasks.start]
description = "Start everything via pitchfork (infra + API + frontend + admin)"
raw = true
run = """
mkdir -p "$SPECKLE_LOGS"
if [ ! -f "$SPECKLE_ROOT/.env" ]; then
  echo "ERROR: .env not found. Run 'mise run setup' first."
  exit 1
fi
if [ ! -f "$SPECKLE_SRC/packages/server/dist/index.js" ] && [ ! -f "$SPECKLE_SRC/packages/server/bin/www" ]; then
  echo "ERROR: Server not built. Run 'mise run setup' first."
  exit 1
fi
pitchfork start -l
mise run admin:ensure
echo ""
echo "══════════════════════════════════════════════════"
echo "  Speckle Server running (pitchfork)"
echo "  Web UI:    http://127.0.0.1:8080"
echo "  API:       http://127.0.0.1:3000"
echo "  GraphQL:   http://127.0.0.1:3000/graphql"
echo "  MinIO:     http://127.0.0.1:9001"
echo "  Status:    pitchfork list"
echo "  Logs:      pitchfork logs -t"
echo "  Stop:      mise run stop"
echo "══════════════════════════════════════════════════"
"""

[tasks.stop]
description = "Stop everything"
run = "pitchfork stop --all"

[tasks.restart]
description = "Restart everything"
raw = true
run = "pitchfork stop --all 2>/dev/null || true; mise run start"

[tasks.status]
description = "Check what's running"
raw = true
run = """
pitchfork list
echo ""
echo "Health checks:"
pg_isready -U speckle >/dev/null 2>&1 && echo "  Postgres  ✓" || echo "  Postgres  ✗"
redis-cli ping >/dev/null 2>&1 && echo "  Redis     ✓" || echo "  Redis     ✗"
curl -sf http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1 && echo "  MinIO     ✓" || echo "  MinIO     ✗"
curl -sf http://127.0.0.1:3000/graphql >/dev/null 2>&1 && echo "  API       ✓" || echo "  API       ✗"
curl -sf -o /dev/null http://127.0.0.1:8080 2>/dev/null && echo "  Frontend  ✓" || echo "  Frontend  ✗"
"""

[tasks.test]
description = "Verify everything works end-to-end"
file = "tasks/test"

[tasks.logs]
description = "Stream all daemon logs (pitchfork)"
raw = true
run = "pitchfork logs -t"

# ── Infra ────────────────────────────────────────────────────────────────────

[tasks."infra:start"]
description = "Start Postgres + Redis + MinIO"
run = "pitchfork start postgres redis minio"

[tasks."infra:stop"]
description = "Stop Postgres + Redis + MinIO"
run = "pitchfork stop postgres redis minio"

[tasks."infra:reset"]
description = "Stop and wipe all data"
confirm = "This will WIPE all Speckle data. Continue?"
run = """
pitchfork stop --all 2>/dev/null || true
echo "Wiping data..."
rm -rf "$SPECKLE_DATA"
echo "Done. Run 'mise run setup' to start fresh."
"""

# ── Server ───────────────────────────────────────────────────────────────────

[tasks."server:start"]
description = "Start API server -> http://127.0.0.1:3000"
run = "pitchfork start speckle-api"

[tasks."server:down"]
description = "Stop server + frontend"
run = "pitchfork stop speckle-frontend speckle-api 2>/dev/null || true"

[tasks."server:up"]
description = "Start dev mode (server + frontend) -> http://127.0.0.1:3000"
raw = true
run = """
mkdir -p "$SPECKLE_LOGS"
cd "$SPECKLE_SRC"
yarn dev:minimal 2>&1 | tee "$SPECKLE_LOGS/server-dev.log"
"""

[tasks."server:build"]
description = "Build all packages for production"
file = "tasks/server-build"
raw = true

# ── Frontend ─────────────────────────────────────────────────────────────────

[tasks."frontend:start"]
description = "Start frontend -> http://127.0.0.1:8080"
run = "pitchfork start speckle-frontend"

# ── Admin ────────────────────────────────────────────────────────────────────

[tasks."admin:ensure"]
description = "Create admin account if needed"
file = "tasks/admin-ensure"
