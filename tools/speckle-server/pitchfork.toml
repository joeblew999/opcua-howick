#:schema https://pitchfork.jdx.dev/schema.json
# pitchfork.toml — Speckle server daemon orchestration
# Secrets injected via fnox (mise=true activates fnox env).

[daemons.postgres]
run = "postgres -D $PGDATA"
ready_cmd = "pg_isready -U speckle"
expected_port = [5432]
retry = 3
mise = true
hooks.on_ready = "createdb -U speckle speckle 2>/dev/null || true; echo '  Postgres ready — localhost:5432'"
hooks.on_fail = "echo '  Postgres FAILED — check: pitchfork logs postgres'"

[daemons.redis]
run = "redis-server --port 6379 --dir $SPECKLE_DATA --dbfilename redis.rdb"
ready_output = "Ready to accept connections"
expected_port = [6379]
retry = 3
mise = true
hooks.on_ready = "echo '  Redis ready — localhost:6379'"

[daemons.minio]
run = "minio server $MINIO_DATA --address :9000 --console-address :9001"
ready_http = "http://127.0.0.1:9000/minio/health/live"
expected_port = [9000, 9001]
retry = 3
mise = true
hooks.on_ready = "echo '  MinIO ready — localhost:9000 (console :9001)'"

[daemons.speckle-api]
run = "fnox exec -- node --import=./esmLoader.js ./bin/www"
dir = "src/packages/server"
env = { NODE_ENV = "production" }
depends = ["postgres", "redis", "minio"]
ready_http = "http://127.0.0.1:3000/graphql"
expected_port = [3000]
retry = true
mise = true
watch = ["src/packages/server/bin/**", "src/packages/server/dist/**"]
hooks.on_ready = "echo '  Speckle API ready — http://127.0.0.1:3000'"
hooks.on_fail = "echo '  Speckle API FAILED — check: pitchfork logs speckle-api'"

[daemons.speckle-frontend]
run = "node .output/server/index.mjs"
dir = "src/packages/frontend-2"
env = { PORT = "8080" }
depends = ["speckle-api"]
ready_http = "http://127.0.0.1:8080"
expected_port = [8080]
retry = true
mise = true
watch = ["src/packages/frontend-2/.output/**"]
hooks.on_ready = "echo '  Speckle Frontend ready — http://127.0.0.1:8080'"
