name: CI

# Rust version pinned in rust-toolchain.toml.
# dtolnay/rust-toolchain installs rust — mise runs tasks only.
# Gate logic: mise.toml ci task (check + fmt-check)

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

jobs:
  # ── Gate ─────────────────────────────────────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"
          components: rustfmt,clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - uses: jdx/mise-action@v2
        with:
          install: false

      - run: mise run ci

  # ── Binary builds ─────────────────────────────────────────────────────────
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux x86_64 — opcua-howick
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
            bin: opcua-howick

          - name: macos arm64 — opcua-howick
            target: aarch64-apple-darwin
            os: macos-latest
            cross: false
            bin: opcua-howick

          - name: macos x86_64 — opcua-howick
            target: x86_64-apple-darwin
            os: macos-latest
            cross: false
            bin: opcua-howick

          - name: pi-5 arm64 — opcua-howick
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            bin: opcua-howick

          - name: pi-zero-2w arm64 — howick-agent
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            bin: howick-agent

          - name: windows x86_64 — opcua-howick
            target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
            bin: opcua-howick

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ matrix.bin }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-

      - name: Install cross
        if: matrix.cross
        run: cargo install cross

      - name: Build
        shell: bash
        run: |
          BIN="${{ matrix.bin }}"
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --bin "$BIN" --target ${{ matrix.target }}
          else
            cargo build --release --bin "$BIN" --target ${{ matrix.target }}
          fi

      - name: Stage
        shell: bash
        run: |
          BIN="${{ matrix.bin }}"
          mkdir -p dist
          EXT=""
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then EXT=".exe"; fi
          cp "target/${{ matrix.target }}/release/${BIN}${EXT}" \
             "dist/${BIN}-${{ matrix.target }}${EXT}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bin }}-${{ matrix.target }}
          path: dist/

  # ── Release ───────────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
