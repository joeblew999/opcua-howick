name: CI

# Gate logic lives in mise.toml ci task:
#   check → cargo check + clippy -D warnings
#   fmt-check → cargo fmt --check
#
# Binary builds run on every push past the gate.
# Release: binaries auto-attached to GitHub Releases.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  release:
    types: [created]

jobs:
  # ── Gate — mise is source of truth ───────────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: mise run ci

  # ── Binary builds — all factory targets ──────────────────────────────────
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - name: macOS Apple Silicon
            target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - name: macOS Intel
            target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - name: Raspberry Pi 5 (arm64)
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - name: Raspberry Pi 3/4 (arm32)
            target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            cross: true

          # Windows x86_64 — opcua-howick.exe for factory PC
          - name: Windows x86_64
            target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
            bin: opcua-howick

          # Pi Zero 2W — howick-agent (minimal, no OPC UA)
          # Plugs into Howick USB port, acts as USB mass storage (fake USB stick)
          - name: Pi Zero 2W — howick-agent (USB gadget)
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            bin: howick-agent

    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      # Build task defined in mise.toml — CI just calls it
      - name: Build
        run: |
          BIN="${{ matrix.bin || 'opcua-howick' }}"
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --bin "$BIN" --target ${{ matrix.target }}
          else
            cargo build --release --bin "$BIN" --target ${{ matrix.target }}
          fi

      - name: Stage
        run: |
          BIN="${{ matrix.bin || 'opcua-howick' }}"
          mkdir -p dist
          # Windows adds .exe extension
          EXT=""
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then EXT=".exe"; fi
          cp "target/${{ matrix.target }}/release/${BIN}${EXT}" \
             "dist/${BIN}-${{ matrix.target }}${EXT}"

      - uses: actions/upload-artifact@v4
        with:
          name: opcua-howick-${{ matrix.target }}
          path: dist/

  # ── Attach to GitHub Release ──────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
