name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  release:
    types: [created]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # ── CI gate (driven by mise) ──────────────────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: CI (check + fmt-check)
        run: mise run ci

  # ── Binary builds — all factory targets ──────────────────────────────────
  build:
    name: Build — ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64 (NUC / server)
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false

          - name: macOS Apple Silicon (Mac Mini)
            target: aarch64-apple-darwin
            os: macos-latest
            cross: false

          - name: macOS Intel
            target: x86_64-apple-darwin
            os: macos-latest
            cross: false

          - name: Raspberry Pi 5 (arm64)
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true

          - name: Raspberry Pi 3/4 (arm32)
            target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross (Pi targets)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross — Pi)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Stage binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/opcua-howick \
             dist/opcua-howick-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opcua-howick-${{ matrix.target }}
          path: dist/

  # ── Attach binaries to GitHub Release ────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
