# opcua-howick configuration
# Topology A (Cloud):  plat_trunk.url = CF Worker URL
# Topology B (LAN):    plat_trunk.url = http://localhost:3000 (Tauri)
# Topology C (Hybrid): plat_trunk.url = http://localhost:3000, Tauri syncs to cloud

[opcua]
host             = "0.0.0.0"
port             = 4840
application_name = "Howick Edge Agent - Si Racha Factory"

[http]
host = "0.0.0.0"
port = 4841   # CF Worker or Tauri backend calls GET /status on this port

[machine]
machine_name       = "Howick FRAMA"
job_input_dir      = "./jobs/input"
machine_input_dir  = "./jobs/machine"    # TODO: confirm with Prin
machine_output_dir = "./jobs/output"     # TODO: confirm with Prin

[plat_trunk]
url                       = "http://localhost:3000"
api_key                   = ""
status_push_interval_secs = 5
