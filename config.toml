# opcua-howick configuration
#
# DEPLOYMENT OPTIONS for Prin's factory (Si Racha, Thailand):
#
# Option A — Pi on LAN, writes to Howick PC via network share:
#   machine_input_dir = "//howick-pc/howick-jobs/"   (SMB share)
#
# Option B — Run opcua-howick.exe directly ON the Howick Windows PC:
#   machine_input_dir = "C:\\Howick\\Jobs\\"         (local path, TBC with Prin)
#   This is the simplest path to demo — no USB stick, no Pi needed.
#   Just drop opcua-howick.exe on the machine PC and configure this file.
#
# Current status: machine_input_dir is a placeholder.
# Ask Prin's operator: "What folder do you copy the USB files into
# on the Howick machine computer?"
#
# Topologies (ADR-0012):
#   Cloud:  plat_trunk.url = "https://your-worker.workers.dev"
#   LAN:    plat_trunk.url = "http://localhost:3000"  (Tauri)
#   Hybrid: LAN primary + Automerge CRDT syncs to cloud

[opcua]
host             = "0.0.0.0"
port             = 4840
application_name = "Howick Edge Agent - Si Racha Factory"

[http]
host = "0.0.0.0"
port = 4841

[machine]
machine_name = "Howick FRAMA"

# Job input: plat-trunk drops CSVs here (or operators copy manually)
job_input_dir = "./jobs/input"

# Machine input: WHERE THE HOWICK SOFTWARE WATCHES FOR CSV FILES
# TODO: ask Prin's operator for the exact path
# Option A (Pi → network share): "//howick-pc/howick-jobs/"
# Option B (Windows, local):     "C:\\Howick\\Jobs\\"
machine_input_dir = "./jobs/machine"

# Machine output: where completion signals appear (if any)
machine_output_dir = "./jobs/output"

[plat_trunk]
# Cloud topology: url = "https://your-worker.workers.dev"
# LAN topology:   url = "http://localhost:3000"
url                       = "http://localhost:3000"
api_key                   = ""
status_push_interval_secs = 5

# ── Pi Zero 2W USB gadget mode ────────────────────────────────────────────────
# Set usb_gadget_mode = true when running on Pi Zero 2W acting as USB mass storage.
# machine_input_dir must point to the mounted USB image (e.g. /mnt/usb_share).
# See docs/pi-zero-usb-gadget.md for full setup guide.
#
# [machine]
# usb_gadget_mode   = true
# machine_input_dir = "/mnt/usb_share"
