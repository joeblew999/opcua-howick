# Speckle — one-shot tasks (setup, test, build, reset, watcher, docker).
# Daemon management (start/stop/logs/status) is in daemon.toml.
# Tool isolation via `mise run -C` (node, postgres, python stay in sub-projects).

# ── Server (one-shot) ────────────────────────────────────────────────────────

["speckle:setup"]
description = "First-time setup: clone, install, build, init infra + watcher deps"
raw = true
run = [
  "mise run -C $OPCUA_ROOT/tools/speckle-server setup",
  "mise run -C $OPCUA_ROOT/tools/speckle-watcher setup",
]

["speckle:test"]
description = "Verify Speckle works end-to-end (7-point check)"
run = "mise run -C $OPCUA_ROOT/tools/speckle-server test"

["speckle:build"]
description = "Build Speckle packages for production"
hide = true
raw = true
run = "mise run -C $OPCUA_ROOT/tools/speckle-server server:build"

["speckle:reset"]
description = "Stop and wipe all Speckle data"
confirm = "This will WIPE all Speckle data (Postgres, Redis, MinIO). Continue?"
run = [
  { task = "speckle:stop" },
  "mise run -C $OPCUA_ROOT/tools/speckle-server infra:reset",
]

# ── Watcher (SketchUp → CSV) ─────────────────────────────────────────────────

["speckle:inspect"]
description = "Inspect SketchUp geometry from Speckle"
run = "mise run -C $OPCUA_ROOT/tools/speckle-watcher model:inspect ${@}"

["speckle:convert"]
description = "Generate Howick CSV from Speckle model — <project_id> <model_id> [output_dir]"
run = "mise run -C $OPCUA_ROOT/tools/speckle-watcher model:convert ${@}"

# ── Docker (fallback — slow on ARM Mac) ───────────────────────────────────────

["speckle:docker:up"]
description = "Start all-Docker Speckle → http://127.0.0.1:8090"
hide = true
run = "mise run -C $OPCUA_ROOT/tools/speckle-docker up"

["speckle:docker:down"]
description = "Stop all-Docker Speckle"
hide = true
run = "mise run -C $OPCUA_ROOT/tools/speckle-docker down"
