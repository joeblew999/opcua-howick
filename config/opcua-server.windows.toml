# opcua-server.windows.toml — Option A: Windows Design PC
#
# Both binaries run on the Design PC alongside SketchUp + FrameBuilderMRD.
#   opcua-server.exe — dashboard + job queue (http://localhost:4841/dashboard)
#   howick-frama.exe — picks up queued jobs, writes to USB stick automatically
#
# Operator drags CSV into the browser. USB stick gets the file automatically.
# Operator still walks the stick to the Howick FRAMA — but copying is automatic.
#
# machine_input_dir = USB stick root. Change D:\ to E:\ or F:\ if needed.

[opcua]
host             = "0.0.0.0"
port             = 4840
application_name = "Howick Edge Agent - Si Racha Factory"
namespace_uri    = "urn:howick-frama"

[http]
host = "0.0.0.0"
port = 4841

[machine]
machine_name = "Howick FRAMA"

# Incoming uploads land here first (watcher picks them up)
job_input_dir = "C:\\opcua-server\\jobs\\input"

# Root of USB stick — Windows assigns D:\ by default for the first USB drive
machine_input_dir = "D:\\"

machine_output_dir = "C:\\opcua-server\\jobs\\output"

# Not a Pi Zero — no USB gadget emulation
usb_gadget_mode = false


[plat_trunk]
# Phase 3 future: set to cloud plat-trunk URL when ready
# Leave as-is for Option A — poller is dormant, jobs arrive via dashboard upload
url                       = "http://localhost:3000"
api_key                   = ""
status_push_interval_secs = 5

[sensor]
# Phase 2: coil sensor — not available in Option A (no Pi Zero GPIO)
# Upgrade to Option B to add the load cell + HX711 sensor.
enabled            = false
empty_spool_kg     = 18.0
steel_kg_per_m     = 0.74
low_alert_m        = 50.0
poll_interval_secs = 30
