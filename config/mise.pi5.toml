# mise.toml — Pi 5 production
# Daemon tasks from daemon.toml (same file as dev). Same commands everywhere.

[settings]
task.timings = true

[tools]
pitchfork = "latest"
fnox = "latest"

[env]
RUST_LOG = "opcua_howick=info"
PITCHFORK_WEB_PORT = "19876"

[task_config]
includes = [".mise/tasks/daemon.toml"]
