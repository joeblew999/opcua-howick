[package]
name = "opcua-howick"
version = "0.1.0"
edition = "2021"
description = "OPC UA edge agent for Howick FRAMA machines — bridges plat-trunk CAD with factory floor hardware"
license = "MIT OR Apache-2.0"
repository = "https://github.com/joeblew999/opcua-howick"
readme = "README.md"

[[bin]]
name = "opcua-howick"
path = "src/main.rs"

[dependencies]
async-opcua = { version = "0.18", features = ["server"] }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "2"
anyhow = "1"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
notify = "6"
# HTTP client for polling plat-trunk API (R2 job queue)
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
