# ── Local test helpers ────────────────────────────────────────────────────────

[tasks."test:submit"]
description = "Submit a fixture CSV directly to opcua-howick HTTP API — JOB=T1 (default) or JOB=W1"
run         = """
JOB=${JOB:-T1}
SRC="dev/fixtures/${JOB}.csv"
if [ ! -f "$SRC" ]; then
  echo "ERROR: fixture not found: $SRC"
  exit 1
fi
CSV=$(cat "$SRC" | python3 -c "import sys; print(sys.stdin.read().replace('\\n','\\\\n').replace('\"','\\\\\"'), end='')")
curl -s -X POST http://localhost:4841/jobs \
  -H 'Content-Type: application/json' \
  -d "{\"frameset_name\":\"${JOB}\",\"csv\":\"${CSV}\"}" \
  | python3 -m json.tool
"""

[tasks."test:status"]
description = "Check local HTTP status"
run         = "curl -s http://localhost:4841/status | python3 -m json.tool"

[tasks."test:health"]
description = "Health check"
run         = "curl -s http://localhost:4841/health"

[tasks."dev:sensor"]
description = "Simulate a coil weight push to opcua-howick (Phase 2 test — no hardware needed)"
run         = """
KG=${COIL_KG:-23.5}
echo "Pushing coil weight: ${KG} kg → http://localhost:4841/api/sensor/coil"
curl -s -X POST http://localhost:4841/api/sensor/coil \
  -H 'Content-Type: application/json' \
  -d "{\"weight_kg\":${KG}}" | python3 -m json.tool
echo ""
echo "Checking /status for coil_remaining:"
curl -s http://localhost:4841/status | python3 -m json.tool | grep -E 'coil|sensor'
"""
