# mise.toml — task runner for opcua-howick
# Rust version is pinned in rust-toolchain.toml (rustup standard).
# mise respects rust-toolchain.toml automatically — do not add rust here.

[tools]
pandoc = "latest"
typst  = "latest"
jq     = "latest"
# cargo-release: install once with `cargo install cargo-release`

[env]
RUST_BACKTRACE = "1"
RUST_LOG       = "opcua_howick=info"

# ── Dev ───────────────────────────────────────────────────────────────────────
# Full local dev loop — no hardware required.
#
# Quickstart (both binaries, one command):
#   mise run dev:all      # builds, then starts opcua-howick + howick-frama (OPC UA)
#   mise run dev:job      # in another terminal — drops test CSV into jobs/input/
#   mise run dev:status   # check machine state via HTTP
#
# Individual terminals (choose your agent mode):
#   terminal 1:  mise run dev              # opcua-howick — OPC UA :4840, HTTP :4841
#
#   terminal 2 option A — OPC UA (production-identical):
#                mise run dev:agent        # howick-frama subscribes via OPC UA
#
#   terminal 2 option B — HTTP polling against opcua-howick:
#                mise run dev:agent:local  # howick-frama polls http://localhost:4841
#
#   terminal 2 option C — HTTP polling against mock-plat-trunk:
#                mise run dev:mock         # start mock-plat-trunk on :3000
#                mise run dev:agent:mock   # howick-frama polls :3000
#
# Auto-rebuild on save:
#   mise run dev:watch    # requires cargo-watch (cargo install cargo-watch)

[tasks."dev:all"]
description = "Start full dev stack — build, then opcua-howick + howick-frama (OPC UA) — Ctrl-C stops both"
depends     = ["dev:setup", "build"]
run         = "bash dev/start.sh"

[tasks."dev:setup"]
description = "Create local jobs directories (run once)"
run         = """
mkdir -p jobs/input jobs/machine jobs/output
echo "Local job dirs ready:"
ls -la jobs/
"""

[tasks.dev]
description = "Run opcua-server locally — OPC UA :4840, HTTP API :4841, watches jobs/input/"
depends     = ["dev:setup"]
run         = "RUST_LOG=opcua_howick=debug cargo run --bin opcua-server"

[tasks."dev:agent"]
description = "Run howick-frama via OPC UA subscription (primary mode) — requires mise run dev in another terminal"
depends     = ["dev:setup"]
run         = "RUST_LOG=howick_frama=debug cargo run --bin howick-frama -- --config howick-frama.dev.toml"

[tasks."dev:agent:mock"]
description = "Run howick-frama polling mock-plat-trunk on :3000 — requires mise run dev:mock in another terminal"
depends     = ["dev:setup"]
run         = "RUST_LOG=howick_frama=debug cargo run --bin howick-frama -- --config howick-frama.dev-mock.toml"

[tasks."dev:agent:local"]
description = "Run howick-frama polling local opcua-howick HTTP API on :4841 — requires mise run dev in another terminal"
depends     = ["dev:setup"]
run         = "RUST_LOG=howick_frama=debug cargo run --bin howick-frama -- --config howick-frama.dev-http.toml"

[tasks."dev:watch"]
description = "Auto-rebuild on source changes (requires cargo-watch: cargo install cargo-watch)"
run         = "cargo watch -x 'build --bin opcua-server --bin howick-frama'"


[tasks."dev:mock"]
description = "Start mock plat-trunk backend on :3000 (Path 2 — simulates plat-trunk serving T1+W1 fixture jobs)"
run         = "cargo run --bin mock-plat-trunk"

[tasks."dev:job"]
description = "Drop a real fixture CSV into jobs/input/ — T1 (roof truss) by default, use JOB=W1 for wall frame"
depends     = ["dev:setup"]
run         = """
JOB=${JOB:-T1}
SRC="dev/fixtures/${JOB}.csv"
DEST="jobs/input/${JOB}.csv"
if [ ! -f "$SRC" ]; then
  echo "ERROR: fixture not found: $SRC"
  echo "Available: $(ls dev/fixtures/*.csv 2>/dev/null | xargs -I{} basename {} .csv | tr '\n' ' ')"
  exit 1
fi
cp "$SRC" "$DEST"
echo "Dropped: $DEST  ($(wc -l < "$SRC") lines)"
ls -lh jobs/input/ jobs/machine/ 2>/dev/null
"""

[tasks."dev:status"]
description = "Check opcua-howick machine state via HTTP API"
run         = "curl -s http://localhost:4841/status | jq ."

[tasks."dev:jobs"]
description = "List jobs via HTTP API"
run         = "curl -s http://localhost:4841/jobs | jq ."

[tasks."dev:browse"]
description = "Show OPC UA endpoint to paste into UaExpert (free GUI browser)"
run         = """
echo ""
echo "OPC UA endpoint:  opc.tcp://localhost:4840/"
echo ""
echo "Browse the live address space with UaExpert (free):"
echo "  Download: https://www.unified-automation.com/downloads/opc-ua-clients.html"
echo "  1. Connect to: opc.tcp://localhost:4840/"
echo "  2. Expand: Objects → Howick → Machine"
echo "  3. Right-click any node → Add to subscription"
echo "     Values update every 500ms automatically."
echo ""
echo "Nodes available:"
echo "  Machine/Status          (Idle | Running | Error | Offline)"
echo "  Machine/CurrentJob      (frameset name)"
echo "  Machine/PiecesProduced  (UInt32)"
echo "  Machine/CoilRemaining   (Double — metres)"
echo "  Machine/LastError       (String)"
echo "  Jobs/QueueDepth         (UInt32)"
echo "  Jobs/CompletedCount     (UInt32)"
echo ""
"""

[tasks.build]
description = "Build (native dev — incremental)"
sources  = ["crates/**/*.rs", "Cargo.toml", "Cargo.lock"]
outputs  = ["target/debug/opcua-server", "target/debug/howick-frama"]
run      = "cargo build"

[tasks.run]
description = "Run opcua-server locally (reads ./opcua-server.dev.toml) — alias for dev"
run         = "cargo run"

[tasks.test]
description = "Run all Rust tests"
run         = "cargo test"

[tasks.check]
description = "Check + clippy -D warnings"
run         = "cargo check && cargo clippy -- -D warnings"

[tasks.fmt]
description = "Format"
run         = "cargo fmt"

[tasks."fmt-check"]
description = "Check formatting (CI)"
run         = "cargo fmt --check"

# ── CI — single source of truth ───────────────────────────────────────────────

[tasks.ci]
description = "Full CI gate — check + fmt + test"
depends     = ["check", "fmt-check", "test"]

# ── Release ───────────────────────────────────────────────────────────────────
# cargo-release bumps Cargo.toml, commits, tags, pushes.
# CI catches the tag push, builds all binaries, creates the GitHub Release.
# Pis self-update on next restart (binary checks GitHub on startup)
#
# Usage:
#   mise run release patch   # 0.1.0 → 0.1.1
#   mise run release minor   # 0.1.0 → 0.2.0
#   mise run release major   # 0.1.0 → 1.0.0

# ── Cross-compile targets ─────────────────────────────────────────────────────
# Prerequisites: cargo install cross

[tasks."build:pi5"]
description = "Cross-compile opcua-howick for Raspberry Pi 5 (aarch64)"
run         = "mise run build:bin -- opcua-server aarch64-unknown-linux-gnu true"

# Pi Zero 2W — uses howick-frama (minimal binary, no OPC UA, no HTTP)
# ~3MB binary, ~16MB RAM — fits Pi Zero 2W (512MB)
# USB gadget mode: appears as USB mass storage to Howick machine
# See docs/customer/06-pi-zero-setup.md for full setup guide
[tasks."build:pi-zero:local"]
description = "Build howick-frama locally (no cross — for local testing only)"
run         = "cargo build --release --bin howick-frama"

[tasks."build:agent:pi-zero"]
description = "Cross-compile howick-frama for Pi Zero 2W (aarch64) — size-optimised profile"
run         = "mise run build:bin -- howick-frama aarch64-unknown-linux-gnu true release-pi-zero"

[tasks."deploy:pi-zero"]
description = "Deploy howick-frama to Pi Zero 2W — installs service + copies howick-frama.pi-zero.toml on first deploy"
depends     = ["build:agent:pi-zero"]
run         = """
VERSION=$(cargo pkgid --quiet opcua-howick | cut -d@ -f2)
scp target/aarch64-unknown-linux-gnu/release-pi-zero/howick-frama ${ZERO_HOST:-pi@howick-pi-zero.local}:~/howick-frama.new
scp deploy/howick-frama.service ${ZERO_HOST:-pi@howick-pi-zero.local}:~/howick-frama.service
ssh ${ZERO_HOST:-pi@howick-pi-zero.local} '
  mv ~/howick-frama.new ~/howick-frama
  chmod +x ~/howick-frama
  if [ ! -f /etc/systemd/system/howick-frama.service ]; then
    sudo mv ~/howick-frama.service /etc/systemd/system/
    sudo systemctl daemon-reload
    sudo systemctl enable howick-frama
    echo "Service installed and enabled"
  else
    rm -f ~/howick-frama.service
  fi
  sudo systemctl restart howick-frama
  sleep 2
  sudo systemctl status howick-frama --no-pager
'
ssh ${ZERO_HOST:-pi@howick-pi-zero.local} "echo 'v${VERSION}' > ~/.howick-frama-version"
# Copy config on first deploy only — don't overwrite if already customised
ssh ${ZERO_HOST:-pi@howick-pi-zero.local} '[ -f ~/howick-frama.pi-zero.toml ]' \
  || { echo "First deploy — copying howick-frama.pi-zero.toml"; \
       scp howick-frama.pi-zero.toml ${ZERO_HOST:-pi@howick-pi-zero.local}:~/howick-frama.pi-zero.toml; }
echo ""
echo "Pi Zero deployed (howick-frama v${VERSION})"
"""

[tasks."setup:dev"]
description = "Install dev tools not in mise registry (run once)"
run         = "cargo install cargo-release"

[tasks.release]
description = "Release a new version — bumps Cargo.toml, tags, pushes; CI builds all binaries + creates GitHub Release"
run         = "cargo release ${1:-patch} --workspace --execute --no-confirm"

[tasks."build:bin"]
description = "Build one binary for one target — used by CI matrix: mise run build:bin -- <bin> <target> [cross=false] [profile=release]"
run         = """
BIN="${1:?usage: mise run build:bin -- <bin> <target> [cross] [profile]}"
TARGET="${2:?usage: mise run build:bin -- <bin> <target> [cross] [profile]}"
USE_CROSS="${3:-false}"
PROFILE="${4:-release}"
if [ "$USE_CROSS" = "true" ]; then
  cross build --profile "$PROFILE" --bin "$BIN" --target "$TARGET"
else
  cargo build --profile "$PROFILE" --bin "$BIN" --target "$TARGET"
fi
"""

[tasks."build:linux"]
description = "Build opcua-howick for Linux x86_64"
run         = "mise run build:bin -- opcua-server x86_64-unknown-linux-gnu"

[tasks."build:mac-arm"]
description = "Build opcua-howick for macOS Apple Silicon"
run         = "mise run build:bin -- opcua-server aarch64-apple-darwin"

[tasks."build:windows"]
description = "Build both binaries for Windows x86_64"
run         = """
mise run build:bin -- opcua-server x86_64-pc-windows-msvc
mise run build:bin -- howick-frama x86_64-pc-windows-msvc
"""

[tasks."build:all"]
description = "Build all factory targets (Pi 5, Pi Zero 2W, Linux, macOS, Windows)"
depends     = ["build:pi5", "build:agent:pi-zero", "build:linux", "build:mac-arm", "build:windows"]

# ── Full lifecycle — first boot ───────────────────────────────────────────────
# Pi Zero 2W: two steps because USB gadget setup reboots the Pi.
#
#   Step 1 (same WiFi as Pi):
#     ZERO_HOST=pi@howick-pi-zero.local mise run setup:first-boot:pi-zero
#     (Pi reboots at end — wait ~30s)
#
#   Step 2 (via Tailscale IP from anywhere):
#     ZERO_HOST=pi@100.x.x.x mise run setup:post-reboot:pi-zero
#
# Pi 5: single step:
#     PI5_HOST=pi@howick-pi5.local mise run setup:first-boot:pi5

[tasks."setup:first-boot:pi-zero"]
description = "Pi Zero 2W first boot — Tailscale + USB gadget (reboots at end)"
run         = """
echo "Step 1/2: Installing Tailscale..."
mise run tailscale:install:pi-zero
echo ""
echo "Step 2/2: USB gadget setup (will reboot Pi)..."
mise run setup:usb-gadget:pi-zero
echo ""
echo "Pi is rebooting. Wait ~30s then run:"
echo "  ZERO_HOST=pi@<tailscale-ip> mise run setup:post-reboot:pi-zero"
"""

[tasks."setup:post-reboot:pi-zero"]
description = "Pi Zero 2W post-reboot — Doppler + deploy binary"
run         = """
echo "Step 1/2: Doppler secrets..."
mise run doppler:setup:pi-zero
echo ""
echo "Step 2/2: Deploy howick-frama binary..."
mise run deploy:pi-zero
echo ""
echo "Pi Zero 2W fully provisioned."
echo "Logs:   mise run logs:pi-zero"
echo "Status: mise run status:pi-zero"
"""

[tasks."setup:first-boot:pi5"]
description = "Pi 5 first boot — Tailscale + dirs + Doppler + deploy"
run         = """
echo "Step 1/4: Installing Tailscale..."
mise run tailscale:install:pi5
echo ""
echo "Step 2/4: Base setup..."
mise run setup:pi5
echo ""
echo "Step 3/4: Doppler secrets..."
mise run doppler:setup:pi5
echo ""
echo "Step 4/4: Deploy binary..."
mise run deploy:pi5
echo ""
echo "Pi 5 fully provisioned."
echo "Logs:    mise run logs:pi5"
echo "Status:  mise run status:pi5"
echo "Monitor: http://<tailscale-ip>:19999"
"""

# ── First-time Pi setup ───────────────────────────────────────────────────────
# Run these once per Pi after flashing. Tailscale must be installed first.

[tasks."setup:usb-gadget:pi-zero"]
description = "One-shot USB gadget setup on Pi Zero 2W (run once after flash)"
run         = """
ssh ${ZERO_HOST:-pi@howick-pi-zero.local} 'sudo bash -s' << 'REMOTE'
set -euo pipefail

# 1. Create 512MB FAT32 disk image
if [ ! -f /piusb.bin ]; then
  echo "Creating /piusb.bin..."
  dd if=/dev/zero of=/piusb.bin bs=1M count=512 status=progress
  mkdosfs /piusb.bin -F 32 -n "HOWICK"
fi

# 2. Mount point
mkdir -p /mnt/usb_share

# 3. Enable dwc2 overlay
CONFIGTXT=/boot/firmware/config.txt
if ! grep -q "dtoverlay=dwc2" "$CONFIGTXT"; then
  echo "dtoverlay=dwc2" >> "$CONFIGTXT"
  echo "Enabled dwc2 in $CONFIGTXT"
fi

# 4. Load modules at boot
CMDLINE=/boot/firmware/cmdline.txt
if ! grep -q "modules-load=dwc2,g_mass_storage" "$CMDLINE"; then
  sed -i 's/rootwait/rootwait modules-load=dwc2,g_mass_storage/' "$CMDLINE"
  echo "Added modules-load to $CMDLINE"
fi

# 5. rc.local — mount image and load gadget on boot
cat > /etc/rc.local << 'EOF'
#!/bin/bash
mount -o loop,sync,noatime /piusb.bin /mnt/usb_share
modprobe g_mass_storage file=/piusb.bin stall=0 ro=0
exit 0
EOF
chmod +x /etc/rc.local

# 6. USB refresh script — called by howick-frama after each CSV write
cat > /usr/local/bin/usb-refresh.sh << 'EOF'
#!/bin/bash
sync
echo 1 > /sys/bus/platform/drivers/dwc2/dwc2/gadget/suspended 2>/dev/null || true
sleep 0.5
echo 0 > /sys/bus/platform/drivers/dwc2/dwc2/gadget/suspended 2>/dev/null || true
EOF
chmod +x /usr/local/bin/usb-refresh.sh

echo ""
echo "USB gadget setup complete. Rebooting in 5 seconds..."
sleep 5
reboot
REMOTE
"""

[tasks."setup:pi5"]
description = "First-time setup on Pi 5 — jobs dir, Netdata, verify service"
run         = """
ssh ${PI5_HOST:-pi@howick-pi5.local} 'sudo bash -s' << 'REMOTE'
set -euo pipefail

# Jobs directory
mkdir -p /home/pi/jobs/input /home/pi/jobs/output
chown -R pi:pi /home/pi/jobs

echo "Pi 5 base setup complete."
echo "Next: mise run tailscale:install:pi5 && mise run doppler:setup:pi5 && mise run deploy:pi5"
REMOTE
"""

# ── Factory deployment ────────────────────────────────────────────────────────
# PI5_HOST  — Tailscale IP or hostname of Pi 5  (e.g. pi@100.x.x.x)
# ZERO_HOST — Tailscale IP or hostname of Pi Zero 2W (e.g. pi@100.x.x.x)

[tasks."deploy:pi5"]
description = "Deploy opcua-server to Pi 5 — installs service + copies opcua-server.pi5.toml on first deploy"
depends     = ["build:pi5"]
run         = """
VERSION=$(cargo pkgid --quiet opcua-howick | cut -d@ -f2)
scp target/aarch64-unknown-linux-gnu/release/opcua-server ${PI5_HOST:-pi@howick-pi5.local}:~/opcua-server.new
scp deploy/opcua-server.service ${PI5_HOST:-pi@howick-pi5.local}:~/opcua-server.service
ssh ${PI5_HOST:-pi@howick-pi5.local} "
  mv ~/opcua-server.new ~/opcua-server
  chmod +x ~/opcua-server
  echo 'v${VERSION}' > ~/.opcua-server-version
  if [ ! -f /etc/systemd/system/opcua-server.service ]; then
    sudo mv ~/opcua-server.service /etc/systemd/system/
    sudo systemctl daemon-reload
    sudo systemctl enable opcua-server
    echo 'Service installed and enabled'
  else
    rm -f ~/opcua-server.service
  fi
  sudo systemctl restart opcua-server
  sleep 2
  sudo systemctl status opcua-server --no-pager
"
# Copy config on first deploy only — don't overwrite if already customised
ssh ${PI5_HOST:-pi@howick-pi5.local} '[ -f ~/opcua-server.pi5.toml ]' \
  || { echo "First deploy — copying opcua-server.pi5.toml"; \
       scp opcua-server.pi5.toml ${PI5_HOST:-pi@howick-pi5.local}:~/opcua-server.pi5.toml; }
"""


[tasks."deploy:windows"]
description = "Copy both binaries + configs to Windows Design PC (\\\\howick-pc or set WINDOWS_HOST)"
depends     = ["build:windows"]
run         = """
DEST=${WINDOWS_HOST:-//howick-pc/c$/opcua-server}
mkdir -p "$DEST"
cp target/x86_64-pc-windows-msvc/release/opcua-server.exe "$DEST"/opcua-server.exe
cp target/x86_64-pc-windows-msvc/release/howick-frama.exe "$DEST"/howick-frama.exe
# Copy configs on first deploy only
[ -f "$DEST/opcua-server.windows.toml" ] || cp opcua-server.windows.toml "$DEST"/opcua-server.windows.toml
[ -f "$DEST/howick-frama.windows.toml" ] || cp howick-frama.windows.toml "$DEST"/howick-frama.windows.toml
echo "Deployed to Windows PC ($DEST)"
echo "  opcua-server.exe --config opcua-server.windows.toml"
echo "  howick-frama.exe --config howick-frama.windows.toml"
echo "Edit both configs before starting."
"""

# ── SSH shortcuts ──────────────────────────────────────────────────────────────

[tasks."ssh:pi5"]
description = "SSH into Pi 5 (use Tailscale IP via PI5_HOST)"
run         = "ssh ${PI5_HOST:-pi@howick-pi5.local}"

[tasks."ssh:pi-zero"]
description = "SSH into Pi Zero 2W (use Tailscale IP via ZERO_HOST)"
run         = "ssh ${ZERO_HOST:-pi@howick-pi-zero.local}"

# ── Logs + status ──────────────────────────────────────────────────────────────

[tasks."logs:pi5"]
description = "Stream live logs from Pi 5"
run         = "ssh ${PI5_HOST:-pi@howick-pi5.local} 'journalctl -u opcua-server -f'"

[tasks."logs:pi-zero"]
description = "Stream live logs from Pi Zero 2W"
run         = "ssh ${ZERO_HOST:-pi@howick-pi-zero.local} 'journalctl -u howick-frama -f'"

[tasks."status:pi5"]
description = "Check Pi 5 service status + HTTP API"
run         = """
ssh ${PI5_HOST:-pi@howick-pi5.local} 'sudo systemctl status opcua-server --no-pager'
curl -s http://${PI5_ADDR:-howick-pi5.local}:4841/status | jq .
"""

[tasks."status:pi-zero"]
description = "Check Pi Zero 2W service status"
run         = "ssh ${ZERO_HOST:-pi@howick-pi-zero.local} 'sudo systemctl status howick-frama --no-pager'"

# ── Tailscale ─────────────────────────────────────────────────────────────────
# Install and check Tailscale on each Pi.
# After install, note the 100.x.x.x IPs and set PI5_HOST / ZERO_HOST accordingly.

[tasks."tailscale:install:pi5"]
description = "Install Tailscale on Pi 5"
run         = """
ssh ${PI5_HOST:-pi@howick-pi5.local} '
  curl -fsSL https://tailscale.com/install.sh | sh
  sudo tailscale up
  echo "Pi 5 Tailscale IP:"
  tailscale ip -4
'
"""

[tasks."tailscale:install:pi-zero"]
description = "Install Tailscale on Pi Zero 2W"
run         = """
ssh ${ZERO_HOST:-pi@howick-pi-zero.local} '
  curl -fsSL https://tailscale.com/install.sh | sh
  sudo tailscale up
  echo "Pi Zero Tailscale IP:"
  tailscale ip -4
'
"""

[tasks."tailscale:status:pi5"]
description = "Check Tailscale status on Pi 5"
run         = "ssh ${PI5_HOST:-pi@howick-pi5.local} 'tailscale status'"

[tasks."tailscale:status:pi-zero"]
description = "Check Tailscale status on Pi Zero 2W"
run         = "ssh ${ZERO_HOST:-pi@howick-pi-zero.local} 'tailscale status'"

# ── Doppler (secrets management) ──────────────────────────────────────────────
# Doppler replaces config.toml secrets (plat_trunk.api_key, etc.) on each Pi.
# Set up project at https://dashboard.doppler.com
# Project: opcua-howick  Config: pi5 / pi-zero

[tasks."doppler:setup:pi5"]
description = "Install Doppler CLI on Pi 5 + authenticate"
run         = """
ssh ${PI5_HOST:-pi@howick-pi5.local} '
  curl -Ls https://cli.doppler.com/install.sh | sudo sh
  doppler login
  doppler setup --project opcua-server --config pi5
  echo "Doppler configured. Run: doppler run -- ./opcua-server"
'
"""

[tasks."doppler:setup:pi-zero"]
description = "Install Doppler CLI on Pi Zero 2W + authenticate"
run         = """
ssh ${ZERO_HOST:-pi@howick-pi-zero.local} '
  curl -Ls https://cli.doppler.com/install.sh | sudo sh
  doppler login
  doppler setup --project opcua-server --config pi-zero
  echo "Doppler configured. Run: doppler run -- ./howick-frama"
'
"""

[tasks."doppler:secrets"]
description = "List all secrets in Doppler for this project (local)"
run         = "doppler secrets --project opcua-server"

# ── Netdata (install on Pi 5 only — Pi Zero 2W has too little RAM) ─────────────

[tasks."netdata:install:pi5"]
description = "Install Netdata on Pi 5 for system + howick-frama monitoring"
run         = """
ssh ${PI5_HOST:-pi@howick-pi5.local} '
  wget -O /tmp/netdata-kickstart.sh https://get.netdata.cloud/kickstart.sh
  sh /tmp/netdata-kickstart.sh --non-interactive
  echo "Netdata installed. Dashboard: http://$(hostname -I | cut -d\" \" -f1):19999"
  echo "Connect to Netdata Cloud at https://app.netdata.cloud to monitor remotely."
'
"""

# ── Docs → PDF (pandoc + typst, no LaTeX needed) ─────────────────────────────
# Prerequisites: mise install (installs pandoc + typst from [tools] above)
#
# All docs live in docs/customer/ — single source of truth.
# PDFs exported to docs/dist/.
#
# Send to Prin in this order:
#   01-proposal.pdf        — what the system is, both options, phases
#   02-system-overview.pdf — topology, where things run, OPC UA, CSV format
#   03-hardware-quote.pdf  — what to order and where
#   04-setup-guide.pdf     — what Prin does vs what Gerard does
#   05-roadmap.pdf         — phases 1–4 with status + open questions
#
# Gerard's operational docs (same folder, not usually sent to Prin):
#   06-pi-zero-setup.pdf   — Pi Zero 2W USB gadget provisioning
#   07-ops-runbook.pdf     — full lifecycle: deploy, update, secrets, monitoring

[tasks."docs:pdf:proposal"]
description = "Export proposal to PDF (01)"
run         = """
mkdir -p docs/dist
pandoc docs/customer/01-proposal.md \
  --pdf-engine=typst \
  --template=docs/templates/howick.typ \
  --metadata title="Factory Automation Proposal" \
  -o docs/dist/01-proposal.pdf
echo "PDF: docs/dist/01-proposal.pdf"
"""

[tasks."docs:pdf:system-overview"]
description = "Export system overview / topology to PDF (02)"
run         = """
mkdir -p docs/dist
pandoc docs/customer/02-system-overview.md \
  --pdf-engine=typst \
  --template=docs/templates/howick.typ \
  --metadata title="System Overview" \
  -o docs/dist/02-system-overview.pdf
echo "PDF: docs/dist/02-system-overview.pdf"
"""

