# mise.toml — task runner for opcua-howick
# Rust version is pinned in rust-toolchain.toml (rustup standard).
# mise respects rust-toolchain.toml automatically — do not add rust here.

[env]
RUST_BACKTRACE = "1"
RUST_LOG       = "opcua_howick=info"

# ── Dev ───────────────────────────────────────────────────────────────────────

[tasks.build]
description = "Build (native dev — incremental)"
sources  = ["src/**/*.rs", "Cargo.toml", "Cargo.lock"]
outputs  = ["target/debug/opcua-howick", "target/debug/howick-agent"]
run      = "cargo build"

[tasks.run]
description = "Run locally (reads ./config.toml)"
run         = "cargo run"

[tasks.test]
description = "Run all Rust tests"
run         = "cargo test"

[tasks.check]
description = "Check + clippy -D warnings"
run         = "cargo check && cargo clippy -- -D warnings"

[tasks.fmt]
description = "Format"
run         = "cargo fmt"

[tasks."fmt-check"]
description = "Check formatting (CI)"
run         = "cargo fmt --check"

# ── CI — single source of truth ───────────────────────────────────────────────

[tasks.ci]
description = "Full CI gate — check + fmt + test"
depends     = ["check", "fmt-check", "test"]

# ── Cross-compile targets ─────────────────────────────────────────────────────
# Prerequisites: cargo install cross

[tasks."build:pi5"]
description = "Cross-compile for Raspberry Pi 5 (aarch64)"
run         = "cross build --release --target aarch64-unknown-linux-gnu"

[tasks."build:pi4"]
description = "Cross-compile for Raspberry Pi 3/4 (armv7)"
run         = "cross build --release --target armv7-unknown-linux-gnueabihf"

# Pi Zero 2W — uses howick-agent (minimal binary, no OPC UA, no HTTP)
# ~3MB binary, ~16MB RAM — fits Pi Zero 2W (512MB)
# USB gadget mode: appears as USB mass storage to Howick machine
# See docs/pi-zero-usb-gadget.md for full setup guide
[tasks."build:agent"]
description = "Build howick-agent (minimal: Pi Zero 2W, no OPC UA, no HTTP)"
run         = "cargo build --release --bin howick-agent"

[tasks."build:agent:pi-zero"]
description = "Cross-compile howick-agent for Pi Zero 2W (aarch64)"
run         = "cross build --release --bin howick-agent --target aarch64-unknown-linux-gnu"

[tasks."deploy:pi-zero"]
description = "Build + deploy howick-agent to Pi Zero 2W (USB gadget mode)"
run         = """
cross build --release --bin howick-agent --target aarch64-unknown-linux-gnu
scp target/aarch64-unknown-linux-gnu/release/howick-agent ${PI_HOST:-pi@howick-pi.local}:~/howick-agent.new
scp config.toml ${PI_HOST:-pi@howick-pi.local}:~/config.toml.example
ssh ${PI_HOST:-pi@howick-pi.local} '
  mv ~/howick-agent.new ~/howick-agent
  chmod +x ~/howick-agent
  sudo systemctl restart howick-agent 2>/dev/null || echo "Service not installed yet — see docs/pi-zero-usb-gadget.md"
  sleep 2
  sudo systemctl status howick-agent --no-pager 2>/dev/null || echo "Run: ./howick-agent"
'
echo ""
echo "Pi Zero deployed (minimal howick-agent)"
echo "Edit ~/config.toml: usb_gadget_mode=true, machine_input_dir=/mnt/usb_share"
echo "See docs/pi-zero-usb-gadget.md for USB gadget setup"
"""

[tasks."build:linux"]
description = "Build for Linux x86_64"
run         = "cargo build --release --target x86_64-unknown-linux-gnu"

[tasks."build:mac-arm"]
description = "Build for macOS Apple Silicon"
run         = "cargo build --release --target aarch64-apple-darwin"

[tasks."build:windows"]
description = "Build for Windows x86_64 (Howick control PC — replaces USB stick)"
run         = "cargo build --release --target x86_64-pc-windows-msvc"

[tasks."build:all"]
description = "Build all factory targets"
depends     = ["build:pi5", "build:pi4", "build:linux"]

# ── Factory deployment ────────────────────────────────────────────────────────

[tasks."deploy:pi"]
description = "Build for Pi 5 + deploy via SSH + restart service"
run         = """
cross build --release --target aarch64-unknown-linux-gnu
scp target/aarch64-unknown-linux-gnu/release/opcua-howick ${PI_HOST:-pi@factory-pi.local}:~/opcua-howick.new
ssh ${PI_HOST:-pi@factory-pi.local} '
  mv ~/opcua-howick.new ~/opcua-howick
  chmod +x ~/opcua-howick
  sudo systemctl restart opcua-howick
  sleep 2
  sudo systemctl status opcua-howick --no-pager
'
"""

[tasks."deploy:windows"]
description = "Copy opcua-howick.exe to Howick Windows PC over network"
run         = """
cargo build --release --target x86_64-pc-windows-msvc
cp target/x86_64-pc-windows-msvc/release/opcua-howick.exe ${WINDOWS_HOST:-//howick-pc/c$/opcua-howick/}/opcua-howick.exe
echo "Deployed to Windows PC. Edit config.toml then run opcua-howick.exe"
"""

[tasks."deploy:config"]
description = "Deploy config.toml to factory Pi"
run         = "scp config.toml ${PI_HOST:-pi@factory-pi.local}:~/config.toml"

[tasks."logs:pi"]
description = "Stream live logs from factory Pi"
run         = "ssh ${PI_HOST:-pi@factory-pi.local} 'journalctl -u opcua-howick -f'"

[tasks."status:pi"]
description = "Check machine status via HTTP API"
run         = "curl -s http://${PI_ADDR:-factory-pi.local}:4841/status | python3 -m json.tool"

# ── Local test helpers ────────────────────────────────────────────────────────

[tasks."test:submit"]
description = "Submit a test CSV job to local opcua-howick"
run         = """
curl -s -X POST http://localhost:4841/jobs \
  -H 'Content-Type: application/json' \
  -d '{"frameset_name":"TEST-W1","csv":"UNIT,MILLIMETRE\nPROFILE,S8908,Standard Profile\nFRAMESET,TEST-W1\nCOMPONENT,TEST-W1-1,LABEL_NRM,1,2400.0,DIMPLE,20.65,DIMPLE,70.65"}' \
  | python3 -m json.tool
"""

[tasks."test:status"]
description = "Check local HTTP status"
run         = "curl -s http://localhost:4841/status | python3 -m json.tool"

[tasks."test:health"]
description = "Health check"
run         = "curl -s http://localhost:4841/health"
