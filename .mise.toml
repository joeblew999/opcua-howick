# mise.toml — task runner for opcua-howick
# Rust version is pinned in rust-toolchain.toml (rustup standard).
# mise respects rust-toolchain.toml automatically — do not add rust here.
#
# Task declarations live in .mise/tasks/*.toml — this file is config only.
# Task scripts (bash) live in .mise/tasks/<group>/<name>.

[settings]
task.timings = true
task.output = "prefix"

[task_config]
includes = [
  ".mise/tasks/daemon.toml",
  ".mise/tasks/dev.toml",
  ".mise/tasks/build.toml",
  ".mise/tasks/device.toml",
  ".mise/tasks/speckle.toml",
]

[tools]
pandoc    = "latest"
typst     = "latest"
jq        = "latest"
pitchfork = "latest"
hk        = "latest"
fnox      = "latest"
pkl       = "latest"
"cargo:cargo-binstall" = "latest"
"cargo:cargo-make" = "latest"

# Vars are available in mise TOML tasks via {{vars.name}} (Tera templates).
# Note: pitchfork.toml and hk.pkl are NOT Tera-aware — they use their own env/config.
[vars]
pi5_host     = "pi@howick-pi5.local"
zero_host    = "pi@howick-pi-zero.local"
opcua_port   = "4840"
http_port    = "4841"
dashboard    = "http://localhost:4841/dashboard"
opcua_url    = "opc.tcp://localhost:4840/"

[env]
OPCUA_ROOT     = "{{config_root}}"
RUST_BACKTRACE = "1"
RUST_LOG       = "opcua_howick=debug,howick_frama=debug"
# Pitchfork web UI — accessible at http://localhost:19876 (dev) or http://<device>:19876 (prod)
PITCHFORK_WEB_PORT = "19876"
